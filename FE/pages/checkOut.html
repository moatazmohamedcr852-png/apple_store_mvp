<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout</title>
  <meta name="description" content="Checkout page with Cash on Delivery payment method." />

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold d-flex align-items-center" href="../index.html">
      <img src="../assets/logo.jpg" alt="Apple Store" class="logo-img">
    </a>

    <div class="icon-group d-flex align-items-center">
      <a href="#" class="nav-icon btn btn-outline-success position-relative"
         data-bs-toggle="modal" data-bs-target="#cartModal">
        <i class="bi bi-cart3"></i>
        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger cart-count">0</span>
      </a>
    </div>
  </div>
</nav>

<main class="py-5">
  <div class="container">
    <div class="row g-4">

      <!-- LEFT SIDE -->
      <div class="col-12 col-lg-7">
        <div class="mb-4">
          <h1 class="display-6 fw-semibold mb-2">Checkout</h1>
          <p class="text-secondary-emphasis mb-0">
            Please add items worth at least 50 LE (Net) to proceed.
          </p>
        </div>

        <div class="card shadow-sm border-0">
          <div class="card-body p-4">

            <h2 class="h5 fw-semibold mb-3">Customer Details</h2>

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input class="form-control" id="Name" placeholder="Ziad">
              </div>

              <div class="col-12">
                <label class="form-label">Email</label>
                <input class="form-control" id="email" type="email" placeholder="you@example.com">
              </div>

              <div class="col-12">
                <label class="form-label">City</label>
                <select class="form-control" id="city">
                  <option value="" disabled selected>Choose Governorate</option>
                  <option>Cairo</option>
                  <option>Giza</option>
                  <option>Alexandria</option>
                  <option>Sharqia</option>
                  <option>Dakahlia</option>
                  <option>Beheira</option>
                  <option>Monufia</option>
                  <option>Gharbia</option>
                  <option>Kafr El Sheikh</option>
                  <option>Damietta</option>
                  <option>Port Said</option>
                  <option>Ismailia</option>
                  <option>Suez</option>
                  <option>North Sinai</option>
                  <option>South Sinai</option>
                  <option>Red Sea</option>
                  <option>Faiyum</option>
                  <option>Beni Suef</option>
                  <option>Minya</option>
                  <option>Assiut</option>
                  <option>Sohag</option>
                  <option>Qena</option>
                  <option>Luxor</option>
                  <option>Aswan</option>
                  <option>New Valley</option>
                  <option>Matrouh</option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label">Address</label>
                <input class="form-control" id="address"
                       placeholder="Street, building, apartment">
              </div>

              <div class="col-12">
                <label class="form-label">Phone</label>
                <input class="form-control" id="phone"
                       placeholder="+20 123456789">
              </div>
            </div>

            <hr class="my-4">

            <!-- PAYMENT METHOD -->
            <h2 class="h5 fw-semibold mb-3">Payment Method</h2>

            <div class="payment-option form-check">
              <input class="form-check-input" type="radio"
                     name="payment" id="pmCod" value="cod" checked>
              <label class="form-check-label w-100" for="pmCod">
                <div class="d-flex justify-content-between align-items-center">
                  <div class="d-flex align-items-center gap-2">
                    <i class="bi bi-truck"></i>
                    <span class="fw-semibold">Cash on Delivery</span>
                  </div>
                </div>
                <div class="text-secondary-emphasis small mt-1">
                  Pay in cash when the order arrives.
                </div>
              </label>
            </div>

            <div class="mt-4">
              <div class="alert alert-warning mb-0">
                Please prepare the full amount on delivery.
                You can inspect the package before paying.
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- RIGHT SIDE -->
      <div class="col-12 col-lg-5">
        <div class="card shadow-sm border-0 sticky-lg-top"
             style="top: 92px; background-color: #effce8;">
          <div class="card-body p-4">

            <h2 class="h5 fw-semibold mb-3">Order Summary</h2>

            <div id="checkoutItems" class="vstack gap-3"></div>

            <hr class="my-4">

            <div class="d-flex justify-content-between">
              <span>Subtotal</span>
              <strong id="subtotal">$0.00</strong>
            </div>

            <div class="d-flex justify-content-between mt-2">
              <span>Shipping</span>
              <strong id="shipping">8 LE</strong>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-between align-items-center">
              <span class="fs-5 fw-semibold">Total</span>
              <span class="fs-5 fw-semibold" id="total">$0.00</span>
            </div>

            <button id="placeOrder"
                    class="btn btn-success btn-lg w-100 mt-4">
              Place Order
            </button>

            <div id="orderMsg"
                 class="small text-secondary-emphasis mt-3"></div>

          </div>
        </div>
      </div>

    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/main.js"></script>
<script src="../js/checkout.js"></script>

</body>
</html>
